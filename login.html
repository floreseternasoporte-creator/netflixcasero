<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Atenis — Acceso</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;750;800&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg: #050505;
      --panel: #0c0c0a;
      --panel-soft: #11110f;
      --card: rgba(255,255,255,0.06);
      --ink: #f7f4ea;
      --ink-soft: rgba(247,244,234,0.68);
      --ink-faint: rgba(247,244,234,0.42);
      --line: rgba(247,244,234,0.12);
      --line-soft: rgba(247,244,234,0.08);
      --accent: #d7ff6f;
      --accent-hov: #c8f05f;
      --accent-ink: #101207;
      --good: #b8f46c;
      --good-soft: rgba(184,244,108,0.12);
      --bad: #ff7a66;
      --bad-soft: rgba(255,122,102,0.12);
      --font-sans: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: var(--font-sans);
      color: var(--ink);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(215,255,111,0.16), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(255,255,255,0.10), transparent 22%),
        linear-gradient(135deg, #050505 0%, #0a0a08 55%, #12140c 100%);
      pointer-events: none;
      z-index: 0;
    }

    .auth-root {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, 0.92fr) minmax(360px, 1fr);
      position: relative;
      z-index: 1;
    }

    .auth-brand {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: clamp(32px, 5vw, 72px);
      border-right: 1px solid var(--line-soft);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.015)),
        var(--panel);
      position: relative;
      overflow: hidden;
    }

    .auth-brand::before {
      content: '';
      position: absolute;
      left: clamp(28px, 5vw, 72px);
      right: clamp(28px, 5vw, 72px);
      bottom: clamp(36px, 6vw, 86px);
      height: 220px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(90deg, rgba(215,255,111,0.22), transparent 42%),
        repeating-linear-gradient(90deg, rgba(247,244,234,0.18) 0 2px, transparent 2px 18px);
      mask-image: linear-gradient(to top, black 0%, transparent 92%);
      opacity: 0.82;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--ink);
      margin-bottom: 0;
    }

    .brand-logo::before {
      content: '';
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--ink) 0 46%, var(--accent) 46% 100%);
      box-shadow: 0 0 34px rgba(215,255,111,0.24);
    }

    .brand-tagline {
      max-width: 560px;
      font-size: clamp(42px, 6.6vw, 88px);
      line-height: 0.9;
      letter-spacing: -0.075em;
      font-weight: 700;
      color: var(--ink);
      position: relative;
      z-index: 1;
    }

    .brand-tagline em {
      color: var(--accent);
      font-style: normal;
    }

    .brand-features { display: none; }

    .auth-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(28px, 6vw, 84px) clamp(20px, 5vw, 72px);
      overflow-y: auto;
    }

    .auth-form-wrap {
      width: 100%;
      max-width: 430px;
      padding: clamp(22px, 4vw, 34px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(10,10,8,0.72);
      box-shadow: 0 24px 80px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
    }

    .auth-view { display: none; animation: authFadeIn 0.22s ease; }
    .auth-view.active { display: block; }
    @keyframes authFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.045);
      margin-bottom: 28px;
    }

    .auth-tab {
      border: 0;
      border-radius: 999px;
      padding: 11px 12px;
      background: transparent;
      color: var(--ink-faint);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .auth-tab.active { background: var(--ink); color: #080808; }

    .auth-view-title {
      font-size: clamp(30px, 4vw, 44px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 720;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .auth-view-sub {
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 650;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }
    .form-input-wrap { position: relative; }
    .form-input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-faint);
      display: flex;
      pointer-events: none;
    }
    .form-input-icon svg, .form-input-toggle svg { width: 17px; height: 17px; stroke: currentColor; }
    .form-input {
      width: 100%;
      padding: 15px 46px 15px 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.055);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus {
      border-color: rgba(215,255,111,0.7);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 4px rgba(215,255,111,0.12);
    }
    .form-input::placeholder { color: var(--ink-faint); }

    .form-input-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--ink-faint);
      padding: 7px;
      cursor: pointer;
    }
    .form-input-toggle:hover { color: var(--ink); background: rgba(255,255,255,0.07); }

    .auth-btn-primary {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: var(--accent-ink);
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 750;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      transition: transform 0.16s, background 0.2s, box-shadow 0.2s;
      box-shadow: 0 14px 38px rgba(215,255,111,0.16);
    }
    .auth-btn-primary:hover { background: var(--accent-hov); transform: translateY(-1px); }
    .auth-btn-primary:active { transform: translateY(0) scale(0.99); }
    .auth-btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .auth-btn-primary .btn-spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(16,18,7,0.28); border-top-color: var(--accent-ink); border-radius: 50%; animation: spin 0.7s linear infinite; }
    .auth-btn-primary .btn-text { display: flex; align-items: center; gap: 8px; }
    .auth-btn-primary.loading .btn-spinner { display: block; }
    .auth-btn-primary.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-footer-link, .auth-switch-text button {
      border: 0;
      background: transparent;
      color: var(--accent);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
    }
    .auth-footer-link:hover, .auth-switch-text button:hover { color: var(--accent-hov); }
    .auth-switch-text { color: var(--ink-faint); font-size: 14px; }

    #authMessage {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.4;
    }
    #authMessage svg { width: 16px; height: 16px; stroke: currentColor; flex-shrink: 0; }
    #authMessage.error { background: var(--bad-soft); border: 1px solid rgba(255,122,102,0.28); color: var(--bad); }
    #authMessage.success { background: var(--good-soft); border: 1px solid rgba(184,244,108,0.28); color: var(--good); }

    .auth-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 0;
      background: transparent;
      color: var(--ink-soft);
      font-family: var(--font-sans);
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 24px;
    }
    .auth-back-btn:hover { color: var(--ink); }
    .auth-back-btn svg { width: 15px; height: 15px; stroke: currentColor; }

    .pwd-strength { height: 3px; margin-top: 8px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .pwd-strength-fill { height: 100%; border-radius: 999px; width: 0; transition: width 0.3s, background 0.3s; }
    .mobile-brand-header { display: none; }

    @media (max-width: 760px) {
      .auth-root { display: flex; flex-direction: column; }
      .auth-brand { display: none; }
      .mobile-brand-header {
        display: flex;
        justify-content: center;
        padding: 28px 20px 10px;
      }
      .mobile-brand-header .brand-logo { font-size: 19px; }
      .auth-panel { padding: 18px 16px 42px; align-items: flex-start; }
      .auth-form-wrap { max-width: 100%; border-radius: 24px; }
      .auth-view-title { font-size: 32px; }
      .form-input { font-size: 16px; }
      .auth-btn-primary { min-height: 52px; }
    }
  </style>
</head>
<body>
  <div class="auth-root">

    <!-- ── Mobile-only top header (just the name) ── -->
    <div class="mobile-brand-header">
      <div class="brand-logo">Atenis</div>
    </div>

    <!-- ── Left: brand panel (desktop only) ── -->
    <div class="auth-brand">
      <div class="brand-logo">Atenis</div>
      <p class="brand-tagline">Streaming simple. <em>Entra y mira.</em></p>
      <div class="brand-features" aria-hidden="true"></div>
    </div>

    <!-- ── Right: form panel ── -->
    <div class="auth-panel">
      <div class="auth-form-wrap">

        <!-- Global message -->
        <div id="authMessage"></div>

        <!-- ── VIEW: Login / Register tabs ── -->
        <div class="auth-view active" id="viewMain">

          <!-- Tab switcher -->
          <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Iniciar sesión</button>
            <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Registrarse</button>
          </div>

          <!-- LOGIN FORM -->
          <form id="loginForm" class="auth-view active" onsubmit="handleLogin(event)">
            <h2 class="auth-view-title">Entrar</h2>
            <p class="auth-view-sub">Accede a tu cuenta.</p>

            <div class="form-group">
              <label class="form-label">Correo electrónico</label>
              <div class="form-input-wrap">
                <span class="form-input-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </span>
                <input type="email" class="form-input" id="loginEmail" placeholder="tu@email.com" autocomplete="email" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Contraseña</label>
              <div class="form-input-wrap">
                <span class="form-input-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </span>
                <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
                <button type="button" class="form-input-toggle" onclick="togglePwd('loginPassword',this)" aria-label="Mostrar contraseña">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
              </div>
            </div>

            <div class="forgot-link-row" style="text-align:right;margin-top:-8px;margin-bottom:20px;">
              <button type="button" class="auth-footer-link" onclick="showView('viewForgot')">
                ¿Olvidaste tu contraseña?
              </button>
            </div>

            <button type="submit" class="auth-btn-primary" id="loginBtn">
              <span class="btn-spinner"></span>
              <span class="btn-text">Iniciar sesión</span>
            </button>

            <div class="auth-switch-text" style="margin-top:20px;text-align:center;">
              <button type="button" onclick="switchTab('register')">Crear cuenta</button>
            </div>
          </form>

          <!-- REGISTER FORM -->
          <form id="registerForm" class="auth-view" onsubmit="handleRegister(event)">
            <h2 class="auth-view-title">Crear cuenta</h2>
            <p class="auth-view-sub">Solo lo necesario para empezar.</p>

            <div class="form-group">
              <label class="form-label">Nombre completo</label>
              <div class="form-input-wrap">
                <span class="form-input-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </span>
                <input type="text" class="form-input" id="registerName" placeholder="Tu nombre" autocomplete="name" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Correo electrónico</label>
              <div class="form-input-wrap">
                <span class="form-input-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </span>
                <input type="email" class="form-input" id="registerEmail" placeholder="tu@email.com" autocomplete="email" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Contraseña</label>
              <div class="form-input-wrap">
                <span class="form-input-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </span>
                <input type="password" class="form-input" id="registerPassword" placeholder="Mínimo 6 caracteres"
                       autocomplete="new-password" required oninput="checkPwdStrength(this.value)">
                <button type="button" class="form-input-toggle" onclick="togglePwd('registerPassword',this)" aria-label="Mostrar contraseña">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
              </div>
              <div class="pwd-strength"><div class="pwd-strength-fill" id="pwdStrengthFill"></div></div>
            </div>

            <div class="form-group">
              <label class="form-label">Confirmar contraseña</label>
              <div class="form-input-wrap">
                <span class="form-input-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </span>
                <input type="password" class="form-input" id="confirmPassword" placeholder="Repite contraseña"
                       autocomplete="new-password" required>
                <button type="button" class="form-input-toggle" onclick="togglePwd('confirmPassword',this)" aria-label="Mostrar contraseña">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
              </div>
            </div>

            <button type="submit" class="auth-btn-primary" id="registerBtn">
              <span class="btn-spinner"></span>
              <span class="btn-text">Crear cuenta</span>
            </button>

            <div class="auth-switch-text" style="margin-top:20px;text-align:center;">
              <button type="button" onclick="switchTab('login')">Iniciar sesión</button>
            </div>
          </form>

        </div><!-- /viewMain -->

        <!-- ── VIEW: Forgot password ── -->
        <div class="auth-view" id="viewForgot">
          <button type="button" class="auth-back-btn" onclick="showView('viewMain')">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Volver
          </button>
          <h2 class="auth-view-title">Recuperar acceso</h2>
          <p class="auth-view-sub">Te enviaremos un enlace.</p>

          <form onsubmit="handleForgot(event)">
            <div class="form-group">
              <label class="form-label">Correo electrónico</label>
              <div class="form-input-wrap">
                <span class="form-input-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </span>
                <input type="email" class="form-input" id="forgotEmail" placeholder="tu@email.com" autocomplete="email" required>
              </div>
            </div>

            <button type="submit" class="auth-btn-primary" id="forgotBtn">
              <span class="btn-spinner"></span>
              <span class="btn-text">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                Enviar enlace
              </span>
            </button>
          </form>

          <!-- Success state (shown after sending) -->
          <div id="forgotSuccess" style="display:none;text-align:center;margin-top:32px;">
            <div style="width:64px;height:64px;border-radius:50%;background:var(--good-soft);border:1px solid rgba(75,123,92,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px;stroke:var(--good);"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <p style="font-size:15px;color:var(--ink-soft);line-height:1.5;">
              Revisa tu correo.
            </p>
            <button type="button" class="auth-btn-primary" style="margin-top:24px;" onclick="showView('viewMain')">
              <span class="btn-text">Volver</span>
            </button>
          </div>

        </div><!-- /viewForgot -->

      </div>
    </div>

  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCFQ_geG0HIv2EZ-bfKc97TJNtf2sdqPzc",
      authDomain: "clack-koder.firebaseapp.com",
      databaseURL: "https://clack-koder-default-rtdb.firebaseio.com",
      projectId: "clack-koder",
      storageBucket: "clack-koder.firebasestorage.app",
      messagingSenderId: "478151254938",
      appId: "1:478151254938:web:e2c00e3a5426bd192b9023",
      measurementId: "G-P29ME5Z3S1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // Auto-redirect if already authenticated
    auth.onAuthStateChanged(user => { if (user) checkUserSubscription(user); });

    // ── View switching ───────────────────────────────────────────────────────

    function showView(id) {
      document.querySelectorAll('.auth-view[id^="view"]').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      hideMessage();
    }

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tab === 'login' ? 'tabLogin' : 'tabRegister').classList.add('active');

      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('registerForm').classList.remove('active');
      document.getElementById(tab === 'login' ? 'loginForm' : 'registerForm').classList.add('active');

      hideMessage();
    }

    // ── Messages ─────────────────────────────────────────────────────────────

    const ICON_ERROR   = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
    const ICON_SUCCESS  = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';

    function showMessage(text, type = 'error') {
      const el = document.getElementById('authMessage');
      el.innerHTML = (type === 'success' ? ICON_SUCCESS : ICON_ERROR) + '<span>' + text + '</span>';
      el.className = type;
      el.style.display = 'flex';
    }

    function hideMessage() {
      const el = document.getElementById('authMessage');
      el.style.display = 'none';
    }

    // ── Login ─────────────────────────────────────────────────────────────────

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn      = document.getElementById('loginBtn');
      setBtnLoading(btn, true);
      hideMessage();
      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        showMessage('Listo', 'success');
        setTimeout(() => checkUserSubscription(cred.user), 900);
      } catch(err) {
        showMessage(getErrMsg(err.code));
      } finally {
        setBtnLoading(btn, false);
      }
    }

    // ── Register ─────────────────────────────────────────────────────────────

    async function handleRegister(e) {
      e.preventDefault();
      const name     = document.getElementById('registerName').value.trim();
      const email    = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;
      const btn      = document.getElementById('registerBtn');

      if (password !== confirm) { showMessage('Las contraseñas no coinciden'); return; }
      if (password.length < 6)  { showMessage('La contraseña debe tener al menos 6 caracteres'); return; }

      setBtnLoading(btn, true);
      hideMessage();
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName: name });

        const selectedPlan = JSON.parse(localStorage.getItem('zambik_selected_plan') || 'null');
        const userData = {
          name, email,
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          subscription: null, profile: null
        };
        if (selectedPlan) {
          userData.selectedPlan = selectedPlan;
          localStorage.removeItem('zambik_selected_plan');
        }
        await database.ref('users/' + cred.user.uid).set(userData);
        sendWelcomeEmail(name, email);

        showMessage('¡Cuenta creada! Redirigiendo...', 'success');
        setTimeout(() => window.location.href = 'subscription.html', 1200);
      } catch(err) {
        showMessage(getErrMsg(err.code));
      } finally {
        setBtnLoading(btn, false);
      }
    }

    // ── Forgot password ──────────────────────────────────────────────────────

    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value.trim();
      const btn   = document.getElementById('forgotBtn');
      setBtnLoading(btn, true);
      hideMessage();
      try {
        await auth.sendPasswordResetEmail(email);
        document.querySelector('#viewForgot form').style.display = 'none';
        document.getElementById('forgotSuccess').style.display = 'block';
      } catch(err) {
        showMessage(getErrMsg(err.code));
      } finally {
        setBtnLoading(btn, false);
      }
    }

    // ── Helpers ──────────────────────────────────────────────────────────────

    function setBtnLoading(btn, loading) {
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    const EYE_OPEN = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
    const EYE_OFF  = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';

    function togglePwd(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = EYE_OFF;
        btn.setAttribute('aria-label', 'Ocultar contraseña');
      } else {
        input.type = 'password';
        btn.innerHTML = EYE_OPEN;
        btn.setAttribute('aria-label', 'Mostrar contraseña');
      }
    }

    function checkPwdStrength(pwd) {
      const fill = document.getElementById('pwdStrengthFill');
      if (!fill) return;
      let score = 0;
      if (pwd.length >= 6)  score++;
      if (pwd.length >= 10) score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      const map = [
        { w: '0%',   bg: 'transparent' },
        { w: '25%',  bg: '#B3492F' },
        { w: '50%',  bg: '#C2603D' },
        { w: '75%',  bg: '#C49A3A' },
        { w: '90%',  bg: '#C49A3A' },
        { w: '100%', bg: '#4B7B5C' },
      ];
      const s = map[score] || map[0];
      fill.style.width = s.w;
      fill.style.background = s.bg;
    }

    async function checkUserSubscription(user) {
      try {
        const snap = await database.ref('users/' + user.uid).once('value');
        const data = snap.val();
        if (data && data.subscription) {
          window.location.href = data.profile ? 'app.html?from=landing' : 'profile-setup.html';
        } else {
          if (data && data.selectedPlan) {
            localStorage.setItem('zambik_preselected_plan', JSON.stringify(data.selectedPlan));
          }
          window.location.href = 'subscription.html';
        }
      } catch(err) {
        window.location.href = 'subscription.html';
      }
    }

    async function sendWelcomeEmail(userName, userEmail) {
      try {
        await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            access_key: '6520a5c5-d52d-4eb4-be3e-f31b35c9a1e6',
            subject: `¡Bienvenido a Atenis, ${userName}!`,
            from_name: 'Atenis',
            to: userEmail,
            message: `¡Hola ${userName}!\n\nBienvenido a Atenis. ¡Disfruta el contenido!\n\nEquipo Atenis`
          })
        });
      } catch(err) { /* silent */ }
    }

    function getErrMsg(code) {
      const msgs = {
        'auth/user-not-found':           'No existe una cuenta con este correo',
        'auth/wrong-password':           'Contraseña incorrecta',
        'auth/invalid-login-credentials':'Correo o contraseña incorrectos',
        'auth/invalid-credential':       'Credenciales inválidas',
        'auth/email-already-in-use':     'Ya existe una cuenta con este correo',
        'auth/weak-password':            'La contraseña debe tener al menos 6 caracteres',
        'auth/invalid-email':            'Correo electrónico inválido',
        'auth/missing-email':            'Ingresa tu correo electrónico',
        'auth/user-disabled':            'Esta cuenta ha sido deshabilitada',
        'auth/too-many-requests':        'Demasiados intentos. Intenta más tarde',
        'auth/network-request-failed':   'Error de conexión. Verifica tu internet',
      };
      return msgs[code] || 'Ha ocurrido un error. Intenta nuevamente';
    }
  </script>
</body>
