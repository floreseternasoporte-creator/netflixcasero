
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zambik - Autenticación</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Contenedor principal de pantalla completa */
    .auth-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
      width: 100%;
    }

    /* Logo */
    .logo {
      text-align: center;
      margin-bottom: 60px;
      animation: slideInUp 0.8s ease-out;
    }

    .logo h1 {
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    .logo p {
      color: #ababab;
      font-size: 16px;
      font-weight: 400;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Contenedor de formularios */
    .forms-container {
      width: 100%;
      max-width: 480px;
      background: #161616;
      padding: 40px;
      border-radius: 12px;
      border: 1px solid #2d2d2d;
    }

    /* Pestañas estilo Uber */
    .auth-tabs {
      display: flex;
      margin-bottom: 32px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 4px;
      border: 1px solid #2d2d2d;
    }

    .auth-tab {
      flex: 1;
      background: transparent;
      border: none;
      color: #ababab;
      padding: 12px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .auth-tab.active {
      background: #ffffff;
      color: #000000;
    }

    /* Formularios */
    .auth-form {
      display: none;
      animation: slideInForm 0.5s ease-out;
    }

    .auth-form.active {
      display: block;
    }

    @keyframes slideInForm {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .form-group {
      margin-bottom: 30px;
    }

    .form-label {
      display: block;
      color: #ababab;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 8px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 400;
      transition: border-color 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: #06C167;
      background: #1a1a1a;
    }

    .form-input::placeholder {
      color: #555555;
      font-weight: 400;
    }

    /* Botón estilo Uber */
    .auth-button {
      width: 100%;
      padding: 16px;
      background: #06C167;
      border: none;
      border-radius: 8px;
      color: #000000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-bottom: 20px;
    }

    .auth-button:hover {
      background: #049451;
    }

    .auth-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .auth-button .spinner {
      display: none;
      margin-right: 10px;
    }

    .auth-button.loading .spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Mensajes */
    .message {
      padding: 18px 24px;
      border-radius: 12px;
      margin-bottom: 30px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .message.error {
      background: rgba(239, 68, 68, 0.9);
      border: 2px solid rgba(255, 107, 53, 0.6);
      color: #ffffff;
      backdrop-filter: blur(10px);
    }

    .message.success {
      background: rgba(34, 197, 94, 0.9);
      border: 2px solid rgba(0, 255, 136, 0.6);
      color: #ffffff;
      backdrop-filter: blur(10px);
    }

    /* Links */
    .auth-link {
      text-align: center;
      margin-top: 30px;
    }

    .auth-link a {
      color: #06C167;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: color 0.2s ease;
    }

    .auth-link a:hover {
      color: #049451;
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .auth-container {
        padding: 15px;
      }
      
      .logo h1 {
        font-size: 42px;
        letter-spacing: 2px;
      }

      .logo h1::before,
      .logo h1::after {
        font-size: 28px;
        left: -35px;
        right: -35px;
      }

      .logo {
        margin-bottom: 30px;
      }

      .logo p {
        font-size: 14px;
      }

      .form-input {
        padding: 16px 18px;
        font-size: 15px;
      }

      .auth-button {
        padding: 18px;
        font-size: 16px;
      }

      .auth-tab {
        padding: 16px;
        font-size: 14px;
      }

      .form-label {
        font-size: 14px;
      }
    }
  </style>
  <link rel="stylesheet" href="uber-theme.css">
  <style>
    /* Pantalla completa: evita que login/registro se vean como modal/tarjeta flotante. */
    body.auth-page {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 15%, rgba(6, 193, 103, 0.16), transparent 32%),
        linear-gradient(135deg, #000 0%, #090909 55%, #121212 100%) !important;
    }

    body.auth-page .auth-container {
      min-height: 100vh;
      width: 100%;
      display: grid;
      grid-template-columns: minmax(280px, 0.9fr) minmax(320px, 1.1fr);
      align-items: stretch;
      padding: 0 !important;
      background: transparent !important;
    }

    body.auth-page .logo {
      margin: 0;
      min-height: 100vh;
      padding: 72px 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      text-align: left;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    }

    body.auth-page .logo h1 {
      font-size: clamp(52px, 8vw, 108px);
      line-height: 0.95;
      letter-spacing: -4px;
      margin-bottom: 24px;
    }

    body.auth-page .logo p {
      max-width: 420px;
      font-size: clamp(18px, 2vw, 26px);
      line-height: 1.35;
      color: #d7d7d7;
    }

    body.auth-page .forms-container {
      width: 100%;
      max-width: none;
      min-height: 100vh;
      padding: clamp(28px, 7vw, 96px);
      border: 0 !important;
      border-radius: 0 !important;
      background: transparent !important;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    body.auth-page .auth-tabs,
    body.auth-page .auth-form,
    body.auth-page #message {
      width: min(100%, 560px);
    }

    body.auth-page .auth-tabs {
      margin-bottom: 40px;
    }

    body.auth-page .form-group {
      margin-bottom: 24px;
    }

    body.auth-page .form-input {
      min-height: 56px;
    }

    @media (max-width: 820px) {
      body.auth-page .auth-container {
        grid-template-columns: 1fr;
      }

      body.auth-page .logo {
        min-height: auto;
        padding: 40px 24px 8px;
        border-right: 0;
        align-items: center;
        text-align: center;
      }

      body.auth-page .logo h1 {
        font-size: 48px;
        letter-spacing: -1px;
      }

      body.auth-page .logo p {
        font-size: 16px;
      }

      body.auth-page .forms-container {
        min-height: auto;
        padding: 24px;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-container">
    <!-- Logo -->
    <div class="logo">
      <h1>Zambik</h1>
      <p>Tu servicio de streaming favorito</p>
    </div>

    <!-- Contenedor de formularios -->
    <div class="forms-container">
      <!-- Pestañas -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Iniciar Sesión</button>
        <button class="auth-tab" onclick="switchTab('register')">Registrarse</button>
      </div>

      <!-- Mensaje de error/éxito -->
      <div id="message" class="message" style="display: none;"></div>

      <!-- Formulario de Login -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="tu@email.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
        </div>

        <button type="submit" class="auth-button">
          <i class="fas fa-spinner spinner"></i>
          Iniciar Sesión
        </button>

        <div class="auth-link">
          <a href="#" onclick="resetPassword()">¿Olvidaste tu contraseña?</a>
        </div>
      </form>

      <!-- Formulario de Registro -->
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">Nombre Completo</label>
          <input type="text" class="form-input" id="registerName" placeholder="Tu nombre completo" required>
        </div>

        <div class="form-group">
          <label class="form-label">Correo Electrónico</label>
          <input type="email" class="form-input" id="registerEmail" placeholder="tu@email.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-input" id="registerPassword" placeholder="Mínimo 6 caracteres" required>
        </div>

        <div class="form-group">
          <label class="form-label">Confirmar Contraseña</label>
          <input type="password" class="form-input" id="confirmPassword" placeholder="Repite tu contraseña" required>
        </div>

        <button type="submit" class="auth-button">
          <i class="fas fa-spinner spinner"></i>
          Crear Cuenta
        </button>
      </form>
    </div>
  </div>

  <script>
    // Configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCFQ_geG0HIv2EZ-bfKc97TJNtf2sdqPzc",
      authDomain: "clack-koder.firebaseapp.com",
      databaseURL: "https://clack-koder-default-rtdb.firebaseio.com",
      projectId: "clack-koder",
      storageBucket: "clack-koder.firebasestorage.app",
      messagingSenderId: "478151254938",
      appId: "1:478151254938:web:e2c00e3a5426bd192b9023",
      measurementId: "G-P29ME5Z3S1"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();



    // Verificar si el usuario ya está autenticado
    auth.onAuthStateChanged((user) => {
      if (user) {
        // Usuario autenticado, verificar si tiene suscripción
        checkUserSubscription(user);
      }
    });

    // Cambiar pestañas
    function switchTab(tab) {
      // Actualizar pestañas
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      
      if (tab === 'login') {
        document.querySelector('.auth-tab').classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
      
      hideMessage();
    }

    // Mostrar mensaje
    function showMessage(text, type = 'error') {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
      messageEl.style.display = 'block';
    }

    // Ocultar mensaje
    function hideMessage() {
      document.getElementById('message').style.display = 'none';
    }

    // Mostrar loading en botón
    function setButtonLoading(button, loading) {
      if (loading) {
        button.classList.add('loading');
        button.disabled = true;
      } else {
        button.classList.remove('loading');
        button.disabled = false;
      }
    }

    // Manejar login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const button = e.target.querySelector('.auth-button');
      
      setButtonLoading(button, true);
      hideMessage();

      try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        showMessage('¡Inicio de sesión exitoso!', 'success');
        
        // Verificar suscripción
        setTimeout(() => {
          checkUserSubscription(userCredential.user);
        }, 1000);
        
      } catch (error) {
        console.error('Error:', error);
        showMessage(getErrorMessage(error.code));
      } finally {
        setButtonLoading(button, false);
      }
    });

    // Manejar registro
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const button = e.target.querySelector('.auth-button');
      
      // Validar contraseñas
      if (password !== confirmPassword) {
        showMessage('Las contraseñas no coinciden');
        return;
      }
      
      if (password.length < 6) {
        showMessage('La contraseña debe tener al menos 6 caracteres');
        return;
      }
      
      setButtonLoading(button, true);
      hideMessage();

      try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        
        // Actualizar perfil con el nombre
        await userCredential.user.updateProfile({
          displayName: name
        });

        // Verificar si hay un plan seleccionado desde landing
        const selectedPlan = JSON.parse(localStorage.getItem('zambik_selected_plan') || 'null');
        
        // Guardar información adicional en la base de datos
        const userData = {
          name: name,
          email: email,
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          subscription: null,
          profile: null
        };
        
        // Si hay un plan seleccionado, agregarlo
        if (selectedPlan) {
          userData.selectedPlan = selectedPlan;
          // Limpiar el plan seleccionado del localStorage
          localStorage.removeItem('zambik_selected_plan');
        }
        
        await database.ref('users/' + userCredential.user.uid).set(userData);

        // Enviar correo de bienvenida
        sendWelcomeEmail(name, email);

        showMessage('¡Cuenta creada exitosamente!', 'success');
        
        // Redirigir a selección de plan
        setTimeout(() => {
          window.location.href = 'subscription.html';
        }, 1000);
        
      } catch (error) {
        console.error('Error:', error);
        showMessage(getErrorMessage(error.code));
      } finally {
        setButtonLoading(button, false);
      }
    });

    // Resetear contraseña
    async function resetPassword() {
      const email = document.getElementById('loginEmail').value;
      
      if (!email) {
        showMessage('Ingresa tu correo electrónico primero');
        return;
      }
      
      try {
        await auth.sendPasswordResetEmail(email);
        showMessage('Se ha enviado un email para restablecer tu contraseña', 'success');
      } catch (error) {
        console.error('Error:', error);
        showMessage(getErrorMessage(error.code));
      }
    }

    // Verificar suscripción del usuario
    async function checkUserSubscription(user) {
      try {
        const userRef = database.ref('users/' + user.uid);
        const snapshot = await userRef.once('value');
        const userData = snapshot.val();
        
        if (userData && userData.subscription) {
          // Tiene suscripción, verificar si tiene perfil
          if (userData.profile) {
            // Todo completo, ir a la plataforma con parámetro para mostrar bienvenida
            window.location.href = 'app.html?from=landing';
          } else {
            // Tiene suscripción pero no perfil
            window.location.href = 'profile-setup.html';
          }
        } else {
          // No tiene suscripción, verificar si tiene plan seleccionado
          if (userData && userData.selectedPlan) {
            // Tiene plan seleccionado, ir directo a suscripción con el plan
            localStorage.setItem('zambik_preselected_plan', JSON.stringify(userData.selectedPlan));
          }
          window.location.href = 'subscription.html';
        }
      } catch (error) {
        console.error('Error verificando suscripción:', error);
        window.location.href = 'subscription.html';
      }
    }

    // Mensajes de error en español
    // Enviar correo de bienvenida usando Web3Forms
    async function sendWelcomeEmail(userName, userEmail) {
      try {
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            access_key: '6520a5c5-d52d-4eb4-be3e-f31b35c9a1e6',
            subject: `¡Bienvenido a Zambik, ${userName}!`,
            from_name: 'Zambik',
            to: userEmail,
            message: `¡Hola ${userName}!\n\nBienvenido a Zambik. Estamos emocionados de tenerte con nosotros.\n\n¿Qué puedes ver en Zambik?\n🎬 Películas exclusivas\n📺 Series originales\n🌟 Estrenos anticipados\n👑 Contenido VIP\n📥 Descargas offline\n\n¡Disfruta del contenido!\n\nEquipo Zambik`
          })
        });
        
        const data = await response.json();
        if (data.success) {
          console.log('✅ Correo enviado a:', userEmail);
        } else {
          console.error('❌ Error:', data);
        }
      } catch (error) {
        console.error('❌ Error:', error);
      }
    }

    function getErrorMessage(errorCode) {
      const errorMessages = {
        'auth/user-not-found': 'No existe una cuenta con este correo electrónico',
        'auth/wrong-password': 'Contraseña incorrecta',
        'auth/invalid-login-credentials': 'Correo o contraseña incorrectos. Verifica tus datos',
        'auth/invalid-credential': 'Credenciales inválidas. Verifica tu correo y contraseña',
        'auth/email-already-in-use': 'Ya existe una cuenta con este correo electrónico',
        'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres',
        'auth/invalid-email': 'Correo electrónico inválido',
        'auth/user-disabled': 'Esta cuenta ha sido deshabilitada',
        'auth/too-many-requests': 'Demasiados intentos fallidos. Intenta más tarde',
        'auth/network-request-failed': 'Error de conexión. Verifica tu internet'
      };
      
      return errorMessages[errorCode] || 'Ha ocurrido un error. Intenta nuevamente';
    }
  </script>
</body>
</html>
