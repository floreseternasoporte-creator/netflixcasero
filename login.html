<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Atenis — Acceso</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg:          #0a0b14;
      --surface:     #0d0e1a;
      --surface-el:  #111322;
      --border:      #1c1e2e;
      --border-str:  #252848;
      --text:        #f5f5f5;
      --muted:       #8b9ab0;
      --subtle:      #4d5a70;
      --accent:      #4c6ef5;
      --accent-hov:  #3b5fd4;
      --accent-glow: rgba(76,110,245,0.22);
      --danger:      #ef4444;
      --danger-soft: rgba(239,68,68,0.12);
      --good:        #22c55e;
      --good-soft:   rgba(34,197,94,0.12);
      --font:        Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius:      16px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      overflow: hidden;
    }

    /* Full-screen background */
    .auth-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(76,110,245,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(76,110,245,0.08) 0%, transparent 50%),
        var(--bg);
      z-index: 0;
    }
    .auth-bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(76,110,245,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(76,110,245,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
    }

    /* Full-screen centered layout */
    .auth-root {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      overflow-y: auto;
    }

    /* Logo at top */
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 32px;
      text-decoration: none;
    }
    .auth-logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
      box-shadow: 0 0 24px rgba(76,110,245,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-logo-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    /* Card */
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(13,14,26,0.85);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px 28px;
      box-shadow:
        0 0 0 1px rgba(76,110,245,0.08),
        0 32px 80px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
    }

    /* Tabs */
    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      margin-bottom: 28px;
    }
    .auth-tab {
      border: 0;
      border-radius: 999px;
      padding: 10px 12px;
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .auth-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(76,110,245,0.35);
    }

    /* View anim */
    .auth-view { display: none; animation: fadeUp 0.22s ease; }
    .auth-view.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .auth-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* Form */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-input-wrap { position: relative; }
    .form-input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--subtle);
      display: flex;
      pointer-events: none;
    }
    .form-input-icon svg { width: 16px; height: 16px; stroke: currentColor; }
    .form-input {
      width: 100%;
      padding: 13px 44px 13px 42px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus {
      border-color: var(--accent);
      background: rgba(76,110,245,0.06);
      box-shadow: 0 0 0 3px rgba(76,110,245,0.15);
    }
    .form-input::placeholder { color: var(--subtle); }
    .form-input-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--subtle);
      padding: 6px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .form-input-toggle:hover { color: var(--text); }
    .form-input-toggle svg { width: 16px; height: 16px; stroke: currentColor; display: block; }

    .forgot-row {
      text-align: right;
      margin: -4px 0 18px;
    }
    .auth-link {
      border: 0;
      background: transparent;
      color: var(--accent);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.15s;
    }
    .auth-link:hover { color: var(--accent-hov); }

    /* Primary button */
    .auth-btn {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
      transition: background 0.18s, transform 0.14s, box-shadow 0.18s;
      box-shadow: 0 8px 24px rgba(76,110,245,0.28);
    }
    .auth-btn:hover { background: var(--accent-hov); transform: translateY(-1px); box-shadow: 0 12px 32px rgba(76,110,245,0.35); }
    .auth-btn:active { transform: translateY(0) scale(0.99); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .auth-btn .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .auth-btn.loading .btn-spinner { display: block; }
    .auth-btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-switch {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-top: 18px;
    }
    .auth-switch button {
      border: 0;
      background: transparent;
      color: var(--accent);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-left: 4px;
    }
    .auth-switch button:hover { color: var(--accent-hov); }

    /* Message */
    #authMessage {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    #authMessage svg { width: 15px; height: 15px; stroke: currentColor; flex-shrink: 0; }
    #authMessage.error   { background: var(--danger-soft); border: 1px solid rgba(239,68,68,0.25); color: var(--danger); }
    #authMessage.success { background: var(--good-soft);   border: 1px solid rgba(34,197,94,0.25);  color: var(--good); }

    /* Back btn */
    .auth-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: color 0.15s;
    }
    .auth-back:hover { color: var(--text); }
    .auth-back svg { width: 14px; height: 14px; stroke: currentColor; }

    /* Password strength */
    .pwd-strength { height: 3px; margin-top: 7px; border-radius: 99px; background: var(--border); overflow: hidden; }
    .pwd-strength-fill { height: 100%; border-radius: 99px; width: 0; transition: width 0.3s, background 0.3s; }

    @media (max-width: 480px) {
      .auth-card { padding: 24px 18px 22px; border-radius: 20px; }
      .auth-logo { margin-bottom: 24px; }
      .auth-title { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-bg-grid"></div>

  <div class="auth-root">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
      </div>
      Atenis
    </div>

    <!-- Card -->
    <div class="auth-card">
      <div id="authMessage"></div>

      <!-- Main view: login + register tabs -->
      <div class="auth-view active" id="viewMain">
        <div class="auth-tabs">
          <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Iniciar sesión</button>
          <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Registrarse</button>
        </div>

        <!-- LOGIN -->
        <form id="loginForm" class="auth-view active" onsubmit="handleLogin(event)">
          <h2 class="auth-title">Bienvenido</h2>
          <p class="auth-sub">Inicia sesión para continuar.</p>

          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <div class="form-input-wrap">
              <span class="form-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" class="form-input" id="loginEmail" placeholder="tu@email.com" autocomplete="email" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <div class="form-input-wrap">
              <span class="form-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="form-input-toggle" onclick="togglePwd('loginPassword',this)" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="forgot-row">
            <button type="button" class="auth-link" onclick="showView('viewForgot')">¿Olvidaste tu contraseña?</button>
          </div>

          <button type="submit" class="auth-btn" id="loginBtn">
            <span class="btn-spinner"></span>
            <span class="btn-text">Iniciar sesión</span>
          </button>

          <div class="auth-switch">
            ¿No tienes cuenta?
            <button type="button" onclick="switchTab('register')">Crear cuenta</button>
          </div>
        </form>

        <!-- REGISTER -->
        <form id="registerForm" class="auth-view" onsubmit="handleRegister(event)">
          <h2 class="auth-title">Crear cuenta</h2>
          <p class="auth-sub">Empieza a ver minis ahora.</p>

          <div class="form-group">
            <label class="form-label">Nombre completo</label>
            <div class="form-input-wrap">
              <span class="form-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <input type="text" class="form-input" id="registerName" placeholder="Tu nombre" autocomplete="name" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <div class="form-input-wrap">
              <span class="form-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" class="form-input" id="registerEmail" placeholder="tu@email.com" autocomplete="email" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <div class="form-input-wrap">
              <span class="form-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" class="form-input" id="registerPassword" placeholder="Mínimo 6 caracteres"
                     autocomplete="new-password" required oninput="checkPwdStrength(this.value)">
              <button type="button" class="form-input-toggle" onclick="togglePwd('registerPassword',this)" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="pwd-strength"><div class="pwd-strength-fill" id="pwdStrengthFill"></div></div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirmar contraseña</label>
            <div class="form-input-wrap">
              <span class="form-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" class="form-input" id="confirmPassword" placeholder="Repite contraseña"
                     autocomplete="new-password" required>
              <button type="button" class="form-input-toggle" onclick="togglePwd('confirmPassword',this)" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-btn" id="registerBtn">
            <span class="btn-spinner"></span>
            <span class="btn-text">Crear cuenta</span>
          </button>

          <div class="auth-switch">
            ¿Ya tienes cuenta?
            <button type="button" onclick="switchTab('login')">Iniciar sesión</button>
          </div>
        </form>

      </div>

      <!-- Forgot password view -->
      <div class="auth-view" id="viewForgot">
        <button type="button" class="auth-back" onclick="showView('viewMain')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Volver
        </button>
        <h2 class="auth-title">Recuperar acceso</h2>
        <p class="auth-sub">Te enviaremos un enlace de recuperación.</p>

        <form onsubmit="handleForgot(event)">
          <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <div class="form-input-wrap">
              <span class="form-input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" class="form-input" id="forgotEmail" placeholder="tu@email.com" autocomplete="email" required>
            </div>
          </div>
          <button type="submit" class="auth-btn" id="forgotBtn">
            <span class="btn-spinner"></span>
            <span class="btn-text">Enviar enlace</span>
          </button>
        </form>

        <div id="forgotSuccess" style="display:none;text-align:center;margin-top:32px;">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--good-soft);border:1px solid rgba(34,197,94,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;stroke:var(--good);"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <p style="font-size:15px;color:var(--muted);line-height:1.5;">Revisa tu correo electrónico.</p>
          <button type="button" class="auth-btn" style="margin-top:24px;" onclick="showView('viewMain')">
            <span class="btn-text">Volver al inicio</span>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCFQ_geG0HIv2EZ-bfKc97TJNtf2sdqPzc",
      authDomain: "clack-koder.firebaseapp.com",
      databaseURL: "https://clack-koder-default-rtdb.firebaseio.com",
      projectId: "clack-koder",
      storageBucket: "clack-koder.firebasestorage.app",
      messagingSenderId: "478151254938",
      appId: "1:478151254938:web:e2c00e3a5426bd192b9023",
      measurementId: "G-P29ME5Z3S1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth     = firebase.auth();
    const database = firebase.database();

    auth.onAuthStateChanged(user => { if (user) checkUserSubscription(user); });

    function showView(id) {
      document.querySelectorAll('.auth-view[id^="view"]').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      hideMessage();
    }

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tab === 'login' ? 'tabLogin' : 'tabRegister').classList.add('active');
      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('registerForm').classList.remove('active');
      document.getElementById(tab === 'login' ? 'loginForm' : 'registerForm').classList.add('active');
      hideMessage();
    }

    const ICON_ERR = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    const ICON_OK  = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';

    function showMessage(text, type='error') {
      const el = document.getElementById('authMessage');
      el.innerHTML = (type === 'success' ? ICON_OK : ICON_ERR) + '<span>' + text + '</span>';
      el.className = type;
      el.style.display = 'flex';
    }
    function hideMessage() {
      document.getElementById('authMessage').style.display = 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn      = document.getElementById('loginBtn');
      setBtnLoading(btn, true);
      hideMessage();
      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        showMessage('Listo', 'success');
        setTimeout(() => checkUserSubscription(cred.user), 900);
      } catch(err) {
        showMessage(getErrMsg(err.code));
      } finally {
        setBtnLoading(btn, false);
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const name     = document.getElementById('registerName').value.trim();
      const email    = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;
      const btn      = document.getElementById('registerBtn');

      if (password !== confirm) { showMessage('Las contraseñas no coinciden'); return; }
      if (password.length < 6)  { showMessage('La contraseña debe tener al menos 6 caracteres'); return; }

      setBtnLoading(btn, true);
      hideMessage();
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName: name });

        const selectedPlan = JSON.parse(localStorage.getItem('zambik_selected_plan') || 'null');
        const userData = {
          name, email,
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          subscription: null, profile: null
        };
        if (selectedPlan) {
          userData.selectedPlan = selectedPlan;
          localStorage.removeItem('zambik_selected_plan');
        }
        await database.ref('users/' + cred.user.uid).set(userData);
        sendWelcomeEmail(name, email);

        showMessage('¡Cuenta creada! Redirigiendo...', 'success');
        setTimeout(() => window.location.href = 'subscription.html', 1200);
      } catch(err) {
        showMessage(getErrMsg(err.code));
      } finally {
        setBtnLoading(btn, false);
      }
    }

    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value.trim();
      const btn   = document.getElementById('forgotBtn');
      setBtnLoading(btn, true);
      hideMessage();
      try {
        await auth.sendPasswordResetEmail(email);
        document.querySelector('#viewForgot form').style.display = 'none';
        document.getElementById('forgotSuccess').style.display = 'block';
      } catch(err) {
        showMessage(getErrMsg(err.code));
      } finally {
        setBtnLoading(btn, false);
      }
    }

    function setBtnLoading(btn, loading) {
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    const EYE_OPEN = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    const EYE_OFF  = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

    function togglePwd(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = EYE_OFF;
        btn.setAttribute('aria-label', 'Ocultar contraseña');
      } else {
        input.type = 'password';
        btn.innerHTML = EYE_OPEN;
        btn.setAttribute('aria-label', 'Mostrar contraseña');
      }
    }

    function checkPwdStrength(pwd) {
      const fill = document.getElementById('pwdStrengthFill');
      if (!fill) return;
      let score = 0;
      if (pwd.length >= 6)  score++;
      if (pwd.length >= 10) score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      const map = [
        { w: '0%',   bg: 'transparent' },
        { w: '25%',  bg: '#ef4444' },
        { w: '50%',  bg: '#f97316' },
        { w: '75%',  bg: '#eab308' },
        { w: '90%',  bg: '#84cc16' },
        { w: '100%', bg: '#22c55e' },
      ];
      const s = map[score] || map[0];
      fill.style.width = s.w;
      fill.style.background = s.bg;
    }

    async function checkUserSubscription(user) {
      try {
        const snap = await database.ref('users/' + user.uid).once('value');
        const data = snap.val();
        if (data && data.subscription) {
          window.location.href = data.profile ? 'app.html?from=landing' : 'profile-setup.html';
        } else {
          if (data && data.selectedPlan) {
            localStorage.setItem('zambik_preselected_plan', JSON.stringify(data.selectedPlan));
          }
          window.location.href = 'subscription.html';
        }
      } catch(err) {
        window.location.href = 'subscription.html';
      }
    }

    async function sendWelcomeEmail(userName, userEmail) {
      try {
        await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            access_key: '6520a5c5-d52d-4eb4-be3e-f31b35c9a1e6',
            subject: `¡Bienvenido a Atenis, ${userName}!`,
            from_name: 'Atenis',
            to: userEmail,
            message: `¡Hola ${userName}!\n\nBienvenido a Atenis. ¡Disfruta el contenido!\n\nEquipo Atenis`
          })
        });
      } catch(err) { /* silent */ }
    }

    function getErrMsg(code) {
      const msgs = {
        'auth/user-not-found':            'No existe una cuenta con este correo',
        'auth/wrong-password':            'Contraseña incorrecta',
        'auth/invalid-login-credentials': 'Correo o contraseña incorrectos',
        'auth/invalid-credential':        'Credenciales inválidas',
        'auth/email-already-in-use':      'Ya existe una cuenta con este correo',
        'auth/weak-password':             'La contraseña debe tener al menos 6 caracteres',
        'auth/invalid-email':             'Correo electrónico inválido',
        'auth/missing-email':             'Ingresa tu correo electrónico',
        'auth/user-disabled':             'Esta cuenta ha sido deshabilitada',
        'auth/too-many-requests':         'Demasiados intentos. Intenta más tarde',
        'auth/network-request-failed':    'Error de conexión. Verifica tu internet',
      };
      return msgs[code] || 'Ha ocurrido un error. Intenta nuevamente';
    }
  </script>
</body>
