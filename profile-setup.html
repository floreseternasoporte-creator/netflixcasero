
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zambik - Configurar Perfil</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      color: #ffffff;
      min-height: 100vh;
      padding: 0;
      margin: 0;
      overflow-x: hidden;
      position: relative;
    }

    /* Contenedor principal estilo Uber */
    .profile-container {
      background: #000000;
      border-radius: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      border: none;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }



    @keyframes rotateBorder {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: scale(0.3) rotate(-10deg);
      }
      50% {
        opacity: 1;
        transform: scale(1.05) rotate(2deg);
      }
      70% {
        transform: scale(0.9) rotate(-1deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header estilo Uber */
    .profile-header {
      text-align: center;
      padding: 48px 20px 32px 20px;
      background: #000000;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid #2d2d2d;
    }

    .profile-title {
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #ffffff;
      letter-spacing: -1px;
    }

    .profile-subtitle {
      color: #ababab;
      font-size: 16px;
      font-weight: 400;
    }

    /* Indicador de paso */
    .step-indicator {
      display: flex;
      justify-content: center;
      margin: 24px 0;
      padding: 0 20px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #161616;
      padding: 12px 24px;
      border-radius: 8px;
      border: 1px solid #2d2d2d;
    }

    .step-number {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #06C167;
      color: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
    }

    .step-text {
      font-size: 15px;
      color: #ffffff;
      font-weight: 600;
    }

    /* Formulario estilo Uber */
    .profile-form {
      display: none;
      padding: 32px;
      background: #000000;
      margin: 0;
      flex: 1;
    }

    .profile-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 28px;
      position: relative;
    }

    .form-label {
      display: block;
      color: #ababab;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      border-radius: 8px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 400;
      transition: border-color 0.2s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .form-input:focus {
      outline: none;
      border-color: #06C167;
      background: #1a1a1a;
    }

    .form-input::placeholder {
      color: #555555;
      font-weight: 400;
    }

    /* Grid de avatares */
    .avatars-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
      padding: 20px;
      background: #161616;
      border-radius: 12px;
      border: 1px solid #2d2d2d;
    }

    .avatar-option {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid #2d2d2d;
      cursor: pointer;
      transition: border-color 0.2s ease;
      overflow: hidden;
      position: relative;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .avatar-option:hover {
      border-color: #555555;
    }

    .avatar-option.selected {
      border-color: #06C167;
      background: rgba(6, 193, 103, 0.1);
    }

    .avatar-option img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Botones estilo Uber */
    .form-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 32px;
    }

    .btn {
      padding: 16px 36px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .btn-primary {
      background: #06C167;
      color: #000000;
    }

    .btn-primary:hover {
      background: #049451;
    }

    .btn-secondary {
      background: #1a1a1a;
      color: #ffffff;
      border: 1px solid #2d2d2d;
    }

    .btn-secondary:hover {
      background: #2d2d2d;
    }

    .btn:active {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn .spinner {
      display: none;
      margin-right: 8px;
    }

    .btn.loading .spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Success animation */
    .success-animation {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #161616;
      color: #ffffff;
      padding: 40px 48px;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 600;
      z-index: 3000;
      text-align: center;
      border: 1px solid #06C167;
      display: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @keyframes successPulse {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
    }

    /* Responsive estilo cartoon */
    @media (max-width: 768px) {
      .profile-header {
        padding: 40px 20px 30px 20px;
      }

      .profile-title {
        font-size: 42px;
      }

      .profile-subtitle {
        font-size: 16px;
      }

      .step {
        padding: 12px 20px;
      }

      .step-number {
        width: 40px;
        height: 40px;
        font-size: 20px;
      }

      .step-text {
        font-size: 16px;
      }

      .form-buttons {
        flex-direction: column;
        gap: 15px;
      }

      .btn {
        padding: 18px 35px;
        font-size: 18px;
      }

      .avatars-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        padding: 15px;
      }

      .avatar-option {
        font-size: 28px;
      }

      .form-input {
        padding: 18px;
        font-size: 16px;
      }

      .form-label {
        font-size: 18px;
      }

      .profile-form {
        padding: 25px 20px;
      }

      .form-group {
        margin-bottom: 30px;
      }
    }

    @media (max-width: 480px) {
      .profile-header {
        padding: 30px 15px 25px 15px;
      }

      .profile-title {
        font-size: 32px;
      }

      .profile-subtitle {
        font-size: 14px;
      }

      .step {
        padding: 10px 15px;
      }

      .step-number {
        width: 35px;
        height: 35px;
        font-size: 18px;
      }

      .step-text {
        font-size: 14px;
      }

      .profile-form {
        padding: 20px 15px;
      }

      .form-label {
        font-size: 16px;
      }

      .form-input {
        padding: 16px;
        font-size: 15px;
      }

      .avatars-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 12px;
      }

      .avatar-option {
        font-size: 24px;
      }

      .btn {
        padding: 16px 30px;
        font-size: 16px;
      }

      .success-animation {
        padding: 25px 35px;
        font-size: 20px;
      }

      .form-group {
        margin-bottom: 25px;
      }
    }
  </style>
  <link rel="stylesheet" href="uber-theme.css">
</head>
<body>
  <div class="profile-container">
    <!-- Header -->
    <div class="profile-header">
      <h1 class="profile-title">Configurar Perfil</h1>
      <p class="profile-subtitle">Personaliza tu experiencia en Zambik</p>
    </div>

    <!-- Indicador de pasos -->
    <div class="step-indicator">
      <div class="step active" id="step1">
        <div class="step-number">1</div>
        <div class="step-text">Información Básica</div>
      </div>
    </div>

    <!-- Formulario de perfil -->
    <form id="profileForm" class="profile-form active">
      <div class="form-group">
        <label class="form-label">Nombre del Perfil</label>
        <input type="text" class="form-input" id="profileName" placeholder="¿Cómo te gusta que te llamen?" required>
      </div>

      <div class="form-group">
        <label class="form-label">Selecciona tu Avatar</label>
        <div class="avatars-grid" id="avatarsGrid">
          <!-- Los avatares se generarán dinámicamente -->
        </div>
      </div>

      <div class="form-buttons">
        <button type="button" class="btn btn-secondary" onclick="logout()">
          Salir
        </button>
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-spinner spinner"></i>
          Crear Perfil
        </button>
      </div>
    </form>
  </div>

  <!-- Animación de éxito -->
  <div id="successAnimation" class="success-animation">
    <div style="margin-bottom: 12px;">
      <i class="fas fa-check-circle" style="font-size: 32px; margin-bottom: 8px;"></i>
    </div>
    <div>¡Perfil creado exitosamente!</div>
    <div style="font-size: 14px; margin-top: 12px; opacity: 0.8;">Bienvenido a Zambik</div>
  </div>

  <script>
    // Configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCFQ_geG0HIv2EZ-bfKc97TJNtf2sdqPzc",
      authDomain: "clack-koder.firebaseapp.com",
      databaseURL: "https://clack-koder-default-rtdb.firebaseio.com",
      projectId: "clack-koder",
      storageBucket: "clack-koder.firebasestorage.app",
      messagingSenderId: "478151254938",
      appId: "1:478151254938:web:e2c00e3a5426bd192b9023",
      measurementId: "G-P29ME5Z3S1"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentUser = null;
    let selectedAvatar = null;

    // Verificar autenticación
    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUser = user;
        checkUserStatus(user);
        generateAvatars();
        document.getElementById('profileName').value = user.displayName || '';
      } else {
        window.location.href = 'login.html';
      }
    });

    // Verificar estado del usuario
    async function checkUserStatus(user) {
      try {
        const userRef = database.ref('users/' + user.uid);
        const snapshot = await userRef.once('value');
        const userData = snapshot.val();
        
        if (!userData || !userData.subscription) {
          // No tiene suscripción, redirigir
          window.location.href = 'subscription.html';
        } else if (userData.profile) {
          // Ya tiene perfil, ir a la plataforma
          window.location.href = 'index.html';
        }
      } catch (error) {
        console.error('Error verificando estado:', error);
      }
    }

    // Generar avatares
    function generateAvatars() {
      const avatarsGrid = document.getElementById('avatarsGrid');
      
      // Lista de avatares con iconos y colores
      const avatars = [
        { type: 'icon', icon: 'fa-user', gradient: 'linear-gradient(135deg, #00A2FF, #0078D4)', color: '#ffffff' },
        { type: 'icon', icon: 'fa-user-ninja', gradient: 'linear-gradient(135deg, #8b5cf6, #a855f7)', color: '#ffffff' },
        { type: 'icon', icon: 'fa-user-astronaut', gradient: 'linear-gradient(135deg, #00FF88, #00D4AA)', color: '#002040' },
        { type: 'icon', icon: 'fa-user-secret', gradient: 'linear-gradient(135deg, #FF6B35, #F7931E)', color: '#ffffff' },
        { type: 'icon', icon: 'fa-cat', gradient: 'linear-gradient(135deg, #ef4444, #f87171)', color: '#ffffff' },
        { type: 'icon', icon: 'fa-dog', gradient: 'linear-gradient(135deg, #06b6d4, #22d3ee)', color: '#ffffff' },
        { type: 'icon', icon: 'fa-dragon', gradient: 'linear-gradient(135deg, #dc2626, #f97316)', color: '#ffffff' },
        { type: 'icon', icon: 'fa-heart', gradient: 'linear-gradient(135deg, #ec4899, #f472b6)', color: '#ffffff' },
        { type: 'icon', icon: 'fa-star', gradient: 'linear-gradient(135deg, #fbbf24, #facc15)', color: '#002040' },
        { type: 'icon', icon: 'fa-rocket', gradient: 'linear-gradient(135deg, #7c3aed, #a855f7)', color: '#ffffff' },
        { type: 'icon', icon: 'fa-gamepad', gradient: 'linear-gradient(135deg, #00FF88, #00D4AA)', color: '#002040' },
        { type: 'icon', icon: 'fa-music', gradient: 'linear-gradient(135deg, #db2777, #ec4899)', color: '#ffffff' }
      ];

      avatars.forEach((avatar, index) => {
        const avatarElement = document.createElement('div');
        avatarElement.className = 'avatar-option';
        avatarElement.style.background = avatar.gradient;
        avatarElement.onclick = () => selectAvatar(index, avatarElement);
        
        if (avatar.type === 'icon') {
          avatarElement.innerHTML = `<i class="fas ${avatar.icon}" style="color: ${avatar.color};"></i>`;
        }
        
        avatarElement.dataset.avatarData = JSON.stringify(avatar);
        avatarsGrid.appendChild(avatarElement);
      });

      // Seleccionar el primer avatar por defecto
      const firstAvatar = avatarsGrid.children[0];
      selectAvatar(0, firstAvatar);
    }

    // Seleccionar avatar
    function selectAvatar(index, element) {
      // Remover selección anterior
      document.querySelectorAll('.avatar-option').forEach(el => {
        el.classList.remove('selected');
      });
      
      // Seleccionar nuevo avatar
      element.classList.add('selected');
      selectedAvatar = {
        index: index,
        data: JSON.parse(element.dataset.avatarData)
      };
    }

    // Manejar envío del formulario
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const profileName = document.getElementById('profileName').value.trim();
      const submitButton = e.target.querySelector('.btn-primary');
      
      if (!profileName) {
        alert('Por favor ingresa un nombre para tu perfil');
        return;
      }
      
      if (!selectedAvatar) {
        alert('Por favor selecciona un avatar');
        return;
      }
      
      setButtonLoading(submitButton, true);

      try {
        // Crear objeto de perfil
        const profile = {
          name: profileName,
          avatar: selectedAvatar,
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          preferences: {
            language: 'es',
            autoplay: true,
            notifications: true
          }
        };

        // Guardar perfil en Firebase
        await database.ref('users/' + currentUser.uid + '/profile').set(profile);

        // Mostrar animación de éxito
        showSuccessAnimation();

        // Redirigir a la plataforma después de 3 segundos
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 3000);

      } catch (error) {
        console.error('Error creando perfil:', error);
        alert('Error al crear el perfil. Intenta nuevamente.');
      } finally {
        setButtonLoading(submitButton, false);
      }
    });

    // Mostrar animación de éxito
    function showSuccessAnimation() {
      const successAnimation = document.getElementById('successAnimation');
      successAnimation.style.display = 'block';
      
      setTimeout(() => {
        successAnimation.style.display = 'none';
      }, 3000);
    }

    // Loading en botón
    function setButtonLoading(button, loading) {
      if (loading) {
        button.classList.add('loading');
        button.disabled = true;
      } else {
        button.classList.remove('loading');
        button.disabled = false;
      }
    }

    // Cerrar sesión
    async function logout() {
      try {
        await auth.signOut();
        window.location.href = 'login.html';
      } catch (error) {
        console.error('Error cerrando sesión:', error);
      }
    }
  </script>
</body>
</html>
