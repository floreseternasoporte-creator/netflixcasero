<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zambik - Tu Servicio de Streaming Favorito</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .login-link {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #ffffff;
      border: none;
      color: #000000;
      padding: 14px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      z-index: 1000;
      transition: background 0.2s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .login-link:hover {
      background: #e5e5e5;
    }

    .welcome-container {
      text-align: center;
      max-width: 560px;
      padding: 60px 48px;
      background: #161616;
      border-radius: 12px;
      border: 1px solid #2d2d2d;
    }

    .logo {
      font-size: 56px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 18px;
      color: #ababab;
      margin-bottom: 40px;
      font-weight: 400;
      line-height: 1.5;
    }

    .buttons-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .main-btn {
      padding: 16px 32px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease, opacity 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .main-btn.primary {
      background: #06C167;
      color: #000000;
    }

    .main-btn.primary:hover {
      background: #049451;
    }

    .main-btn.secondary {
      background: #ffffff;
      color: #000000;
    }

    .main-btn.secondary:hover {
      background: #e5e5e5;
    }

    @media (max-width: 768px) {
      .welcome-container {
        margin: 20px;
        padding: 40px 24px;
      }

      .logo {
        font-size: 40px;
      }

      .subtitle {
        font-size: 16px;
      }

      .buttons-container {
        flex-direction: column;
        align-items: stretch;
      }

      .main-btn {
        justify-content: center;
      }

      .login-link {
        bottom: 20px;
        right: 20px;
        padding: 12px 16px;
        font-size: 13px;
      }
    }
  </style>
  <link rel="stylesheet" href="uber-theme.css">
</head>
<body>
  <div class="welcome-container">
    <h1 class="logo">Zambik</h1>
    <p class="subtitle">Tu plataforma de streaming favorita</p>
    
    <div class="buttons-container">
      <a href="landing.html" class="main-btn primary">
        <i class="fas fa-star"></i>
        Explorar Planes
      </a>
      <a href="login.html" class="main-btn secondary">
        <i class="fas fa-play"></i>
        Empezar Ahora
      </a>
    </div>
  </div>
  
  <a href="login.html" class="login-link">
    <i class="fas fa-user"></i>
    Ya tengo cuenta
  </a>
</body>
</html>
